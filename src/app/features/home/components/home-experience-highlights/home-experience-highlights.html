<section id="experiencia" class="experience-block" aria-labelledby="experience-title">
  <p class="experience-block__eyebrow">Perfil técnico</p>
  <h2 id="experience-title">Experiencia Profesional</h2>

  <div class="experience-block__grid">
    @for (item of highlights; track item.title; let idx = $index) {
      <article class="experience-card" [style.--card-index]="idx">
        <header class="experience-card__head">
          <h3>{{ item.title }}</h3>
          <p class="experience-card__period">{{ item.period }}</p>
        </header>
        <p class="experience-card__description">{{ item.description }}</p>
      </article>
    }
  </div>
</section>
